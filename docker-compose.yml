# This file defines the services needed to run the application locally.
#
# Services:
#   db       - PostgreSQL database for the application (port 5432)
#   backend  - The FastAPI app, built from ./backend/Dockerfile (port 8000)
#
# Usage:
#   Start all services:   docker compose up -d
#   Stop all services:    docker compose down
#   Wipe app data too:    docker compose down -v

services:
  # Application database — data is persisted in a Docker volume so it
  # survives container restarts.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend — waits for db to be healthy before starting.
  # DATABASE_URL uses "db" as the hostname, which is the service name above.
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
